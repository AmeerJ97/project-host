# Project Host — Inference-Only Profile
# Dedicated inference sessions, desktop not actively used
# Trades responsiveness for throughput

# GPU
EXPECT_POWER_LIMIT="150.00"
EXPECT_CLOCK_LOCK="2100"

# Ollama override.conf expectations
EXPECT_OLLAMA_VARS=(
    "OLLAMA_HOST=0.0.0.0"
    "OLLAMA_MODELS=/home/active/inference/ollama"
    "OLLAMA_FLASH_ATTENTION=1"
    "OLLAMA_KEEP_ALIVE=24h"
    "OLLAMA_KV_CACHE_TYPE=q8_0"
    "GGML_CUDA_ENABLE_UNIFIED_MEMORY=1"
    "OLLAMA_MAX_LOADED_MODELS=1"
    "OLLAMA_NUM_PARALLEL=2"
    "OLLAMA_LLM_LIBRARY=cuda_v12"
    "CPUAffinity=0-7"
    "CPUQuota=784%"
    "OOMScoreAdjust=-900"
    "IOWeight=900"
)

# Memory
EXPECT_HUGEPAGES="4096"
EXPECT_SWAPPINESS="1"

# CPU thermal
EXPECT_CPU_AFFINITY="0-7"
EXPECT_CPU_QUOTA="784%"
